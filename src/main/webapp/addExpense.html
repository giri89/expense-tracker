<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Add Expense</title>

<link
	href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
	rel="stylesheet">

</head>

<body class="bg-light">

	<div class="container mt-5">

		<div class="row justify-content-center">

			<div class="col-md-5">

				<div class="card shadow">

					<div class="card-header bg-dark text-white text-center">
						<h4>Add Expense</h4>
					</div>

					<div class="card-body">

						<form action="addExpense" method="post">

							<div class="mb-3">
								<label class="form-label">Title</label> <input type="text"
									name="title" class="form-control" required>
							</div>

							<div class="mb-3">
								<label class="form-label">Amount</label> <input type="number"
									name="amount" class="form-control" required>
							</div>

							<div class="mb-3">
								<label class="form-label">Category</label> <input type="text"
									name="category" class="form-control" required>
							</div>

							<button type="submit" class="btn btn-success w-100">Add
								Expense</button>

						</form>

						<div class="text-center mt-3">

							<a href="dashboard" class="btn btn-secondary btn-sm"> Back to
								Dashboard </a>

						</div>

					</div>

				</div>

			</div>

		</div>

	</div>

</body>
</html>
